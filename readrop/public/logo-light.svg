<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 34" height="28" role="img" aria-label="Readrop">
  <defs>
    <linearGradient id="lgl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef7a5c"/>
      <stop offset="100%" stop-color="#d44d35"/>
    </linearGradient>
  </defs>

  <!-- Book spine -->
  <rect x="1" y="2" width="6" height="28" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- Book cover -->
  <rect x="7" y="2" width="21" height="28" rx="1" fill="url(#lgl)"/>

  <!-- Spine/cover separation -->
  <line x1="7" y1="2" x2="7" y2="30"
        stroke="rgba(0,0,0,0.10)" stroke-width="1"/>

  <!-- Page block -->
  <rect x="28" y="3" width="4" height="26" rx="1" fill="rgba(255,255,255,0.75)"/>
  <line x1="28" y1="7"  x2="32" y2="7"  stroke="rgba(180,120,90,0.4)" stroke-width="0.5"/>
  <line x1="28" y1="11" x2="32" y2="11" stroke="rgba(180,120,90,0.4)" stroke-width="0.5"/>
  <line x1="28" y1="15" x2="32" y2="15" stroke="rgba(180,120,90,0.4)" stroke-width="0.5"/>
  <line x1="28" y1="19" x2="32" y2="19" stroke="rgba(180,120,90,0.4)" stroke-width="0.5"/>
  <line x1="28" y1="23" x2="32" y2="23" stroke="rgba(180,120,90,0.4)" stroke-width="0.5"/>

  <!-- Cover title lines -->
  <line x1="10" y1="10" x2="25" y2="10" stroke="rgba(255,255,255,0.60)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="14" x2="25" y2="14" stroke="rgba(255,255,255,0.60)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="18" x2="25" y2="18" stroke="rgba(255,255,255,0.60)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="22" x2="20" y2="22" stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Wordmark (white) -->
  <text x="41" y="27"
        font-family="Georgia,'Times New Roman',serif"
        font-size="24" font-weight="700"
        fill="#faf7f2" letter-spacing="-0.5">readrop</text>

  <!-- Raindrop accent -->
  <path d="M147 12 C143.5 15 143 21 147 25 C150.5 21 150 15 147 12 Z"
        fill="url(#lgl)"/>
</svg>
