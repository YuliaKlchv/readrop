<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 34" height="36" role="img" aria-label="Readrop">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e25c3d"/>
      <stop offset="100%" stop-color="#b53020"/>
    </linearGradient>
  </defs>

  <!-- Book spine (narrow left strip, darker) -->
  <rect x="1" y="2" width="6" height="28" rx="2" fill="#8b2f14"/>

  <!-- Book cover -->
  <rect x="7" y="2" width="21" height="28" rx="1" fill="url(#lg)"/>

  <!-- Spine/cover separation -->
  <line x1="7" y1="2" x2="7" y2="30"
        stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Page block: right edge of closed book -->
  <rect x="28" y="3" width="4" height="26" rx="1" fill="#f2e8df"/>
  <line x1="28" y1="7"  x2="32" y2="7"  stroke="#c0a898" stroke-width="0.5"/>
  <line x1="28" y1="11" x2="32" y2="11" stroke="#c0a898" stroke-width="0.5"/>
  <line x1="28" y1="15" x2="32" y2="15" stroke="#c0a898" stroke-width="0.5"/>
  <line x1="28" y1="19" x2="32" y2="19" stroke="#c0a898" stroke-width="0.5"/>
  <line x1="28" y1="23" x2="32" y2="23" stroke="#c0a898" stroke-width="0.5"/>

  <!-- Cover title lines -->
  <line x1="10" y1="10" x2="25" y2="10" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="14" x2="25" y2="14" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="18" x2="25" y2="18" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="22" x2="20" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="41" y="27"
        font-family="Georgia,'Times New Roman',serif"
        font-size="24" font-weight="700"
        fill="#1a1208" letter-spacing="-0.5">readrop</text>

  <!-- Raindrop accent at end of wordmark -->
  <path d="M147 12 C143.5 15 143 21 147 25 C150.5 21 150 15 147 12 Z"
        fill="url(#lg)"/>
</svg>
