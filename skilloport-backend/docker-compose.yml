# Local stack: PostgreSQL + the Spring Boot backend.
#   docker compose up --build
# Backend on http://localhost:3000, Postgres on localhost:5432.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skilloport
      POSTGRES_USER: skilloport
      POSTGRES_PASSWORD: skilloport
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilloport -d skilloport"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: skilloport
      DB_USER: skilloport
      DB_PASSWORD: skilloport
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
