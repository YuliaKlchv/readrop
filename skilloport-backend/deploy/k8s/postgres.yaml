apiVersion: v1
kind: Secret
metadata:
  name: skilloport-db
type: Opaque
stringData:
  POSTGRES_DB: skilloport
  POSTGRES_USER: skilloport
  POSTGRES_PASSWORD: change-me-in-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skilloport-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skilloport-db
  labels:
    app: skilloport-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skilloport-db
  template:
    metadata:
      labels:
        app: skilloport-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: skilloport-db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "skilloport", "-d", "skilloport"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skilloport-db
---
apiVersion: v1
kind: Service
metadata:
  name: skilloport-db
spec:
  selector:
    app: skilloport-db
  ports:
    - port: 5432
      targetPort: 5432
