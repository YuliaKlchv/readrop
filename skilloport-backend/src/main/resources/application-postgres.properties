# PostgreSQL profile — used with docker-compose (db service) or any PG instance.
# Enable with: SPRING_PROFILES_ACTIVE=postgres  (or -Dspring-boot.run.profiles=postgres)

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skilloport}
spring.datasource.username=${DB_USER:skilloport}
spring.datasource.password=${DB_PASSWORD:skilloport}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# No H2 console outside the in-memory dev profile.
spring.h2.console.enabled=false
