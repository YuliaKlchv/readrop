# SonarQube / SonarCloud configuration.
# Run a local SonarQube (free Community Edition) with:
#   docker run -d --name sonarqube -p 9000:9000 sonarqube:community
# then analyze with:
#   mvn clean verify sonar:sonar -Dsonar.host.url=http://localhost:9000 -Dsonar.login=<token>

sonar.projectKey=readrop-backend
sonar.projectName=Readrop Backend
sonar.projectVersion=1.0.0

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage produced by JaCoCo (see pom.xml).
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Checkstyle report (optional import).
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

sonar.sourceEncoding=UTF-8
