spring.application.name=readrop-backend

# Same port the existing Vite proxy targets, so the React frontend keeps working.
server.port=${PORT:3000}

# ---- Default datasource: H2 in-memory (zero-setup dev, free) ----
# Activate the "postgres" profile (SPRING_PROFILES_ACTIVE=postgres) for PostgreSQL.
spring.datasource.url=jdbc:h2:mem:readrop;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Schema is owned by Flyway migrations; Hibernate never alters it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# H2 web console (dev only): http://localhost:3000/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Actuator: health/readiness/liveness probes ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# ---- Auth ----
app.jwt.expires-days=30
app.jwt.secret=${JWT_SECRET:}
app.cookie.name=sid
app.cookie.secure=${COOKIE_SECURE:false}
app.bcrypt.strength=12
app.data-dir=${APP_DATA_DIR:data}
app.seed-demo=${APP_SEED_DEMO:true}

# ---- Static frontend (prod) ----
app.dist-dir=${APP_DIST_DIR:dist}
