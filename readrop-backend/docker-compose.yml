# Local stack: PostgreSQL + the Spring Boot backend.
#   docker compose up --build
# Backend on http://localhost:3000, Postgres on localhost:5432.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readrop
      POSTGRES_USER: readrop
      POSTGRES_PASSWORD: readrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readrop -d readrop"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/readrop
      SPRING_DATASOURCE_USERNAME: readrop
      SPRING_DATASOURCE_PASSWORD: readrop
      PORT: "3000"
      APP_SEED_DEMO: "true"
      APP_DATA_DIR: /app/data
    ports:
      - "3000:3000"
    volumes:
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  appdata:
